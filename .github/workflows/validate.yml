name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static validation (frontmatter, bash syntax, JSON payloads)
        run: python3 scripts/validate.py
      - name: Test jq expressions against mock API responses
        run: bash scripts/test-jq.sh

  # Optional live check against the real xAI API.
  # Runs only on manual dispatch and only if the GROK_API_KEY repo secret is set
  # (Settings > Secrets and variables > Actions).
  live-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping Grok chat endpoint
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          if [ -z "$GROK_API_KEY" ]; then
            echo "GROK_API_KEY secret not set — skipping live smoke test."
            exit 0
          fi
          curl -sf https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"grok-4.3","messages":[{"role":"user","content":"Reply with exactly: pong"}]}' \
            | jq -e '.choices[0].message.content'
